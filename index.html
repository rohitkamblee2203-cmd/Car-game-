<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚗 Car Game</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(to bottom, #87CEEB, #98FB98);
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        canvas {
            border: 3px solid #333;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 70%, #228B22 70%, #228B22 100%);
        }
        .ui {
            margin: 10px 0;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            font-size: 24px;
            display: none;
        }
        button {
            background: #ff4444;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>
    <div class="ui">
        Score: <span id="score">0</span> | 
        High Score: <span id="highScore">0</span>
    </div>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    
    <div class="game-over" id="gameOver">
        <h2>💥 Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <button onclick="restartGame()">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        // Game state
        let gameRunning = true;
        let score = 0;
        let highScore = localStorage.getItem('carGameHighScore') || 0;
        highScoreEl.textContent = highScore;

        // Player car
        const car = {
            x: 175,
            y: 450,
            width: 50,
            height: 80,
            speed: 0
        };

        // Game objects
        let obstacles = [];
        let coins = [];
        let frameCount = 0;

        // Controls
        const keys = {};

        // Event listeners
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
        });
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Draw car
        function drawCar() {
            ctx.fillStyle = '#ff4444';
            ctx.fillRect(car.x, car.y, car.width, car.height);
            
            // Car details
            ctx.fillStyle = '#333';
            ctx.fillRect(car.x + 5, car.y + 10, 40, 20); // Window
            ctx.fillRect(car.x + 10, car.y + 35, 30, 15); // Seat
            ctx.fillStyle = '#000';
            ctx.fillRect(car.x + 15, car.y + 55, 20, 25); // Wheels
            ctx.fillRect(car.x + 30, car.y + 55, 15, 25);
        }

        // Draw obstacle
        function drawObstacle(obstacle) {
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);
            ctx.fillStyle = '#654321';
            ctx.fillRect(obstacle.x + 5, obstacle.y + 5, obstacle.width - 10, obstacle.height - 10);
        }

        // Draw coin
        function drawCoin(coin) {
            ctx.save();
            ctx.translate(coin.x + coin.width/2, coin.y + coin.height/2);
            ctx.rotate(frameCount * 0.1);
            ctx.fillStyle = '#FFD700';
            ctx.fillRect(-coin.width/2, -coin.height/2, coin.width, coin.height);
            ctx.fillStyle = '#FFA500';
            ctx.fillRect(-coin.width/2 + 5, -coin.height/2 + 5, coin.width - 10, coin.height - 10);
            ctx.restore();
        }

        // Collision detection
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // Update game
        function update() {
            if (!gameRunning) return;

            frameCount++;

            // Car movement
            if (keys['ArrowLeft'] || keys['a']) {
                car.x = Math.max(0, car.x - 5);
            }
            if (keys['ArrowRight'] || keys['d']) {
                car.x = Math.min(canvas.width - car.width, car.x + 5);
            }

            // Spawn obstacles
            if (frameCount % 90 === 0) {
                obstacles.push({
                    x: Math.random() * (canvas.width - 60),
                    y: -80,
                    width: 60,
                    height: 80,
                    speed: 3 + Math.min(score / 1000, 5)
                });
            }

            // Spawn coins
            if (frameCount % 120 === 0) {
                coins.push({
                    x: Math.random() * (canvas.width - 30),
                    y: -30,
                    width: 30,
                    height: 30,
                    speed: 2 + Math.min(score / 1000, 3)
                });
            }

            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].y += obstacles[i].speed;
                if (obstacles[i].y > canvas.height) {
                    obstacles.splice(i, 1);
                    score += 10;
                }
            }

            // Update coins
            for (let i = coins.length - 1; i >= 0; i--) {
                coins[i].y += coins[i].speed;
                if (coins[i].y > canvas.height) {
                    coins.splice(i, 1);
                } else if (checkCollision(car, coins[i])) {
                    coins.splice(i, 1);
                    score += 50;
                }
            }

            // Collision with obstacles
            for (let obstacle of obstacles) {
                if (checkCollision(car, obstacle)) {
                    gameOver();
                    return;
                }
            }

            scoreEl.textContent = score;
        }

        // Draw everything
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw road lines
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 5;
            for (let i = 0; i < canvas.height; i += 40) {
                ctx.setLineDash([20, 20]);
                ctx.beginPath();
                ctx.moveTo(canvas.width/2 - 10, i + frameCount % 40);
                ctx.lineTo(canvas.width/2 + 10, i + frameCount % 40);
                ctx.stroke();
            }
            ctx.setLineDash([]);

            // Draw game objects
            obstacles.forEach(drawObstacle);
            coins.forEach(drawCoin);
            drawCar();
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            if (score > highScore) {
                highScore = score;
                highScoreEl.textContent = highScore;
                localStorage.setItem('carGameHighScore', highScore);
            }
            finalScoreEl.textContent = score;
            gameOverEl.style.display = 'block';
        }

        // Restart game
        function restartGame() {
            gameRunning = true;
            score = 0;
            car.x = 175;
            obstacles = [];
            coins = [];
            frameCount = 0;
            gameOverEl.style.display = 'none';
            scoreEl.textContent = score;
        }

        // Start the game
        gameLoop();
    </script>
</body>
</html>
